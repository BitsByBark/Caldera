name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (Arch + Fedora)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Preflight icon checks (Linux)
        run: |
          ./scripts/check-icons.sh

      - name: Build Tauri (Linux)
        working-directory: backend
        run: |
          cargo install tauri-cli --version "^2.0" --locked
          cargo tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caldera-linux
          path: |
            backend/target/release/bundle/deb/*.deb
            backend/target/release/bundle/rpm/*.rpm
            backend/target/release/bundle/appimage/*.AppImage
            backend/target/release/caldera

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Preflight icon checks (Windows)
        shell: pwsh
        run: |
          ./scripts/check-icons.ps1

      - name: Build Tauri (Windows)
        working-directory: backend
        run: |
          cargo install tauri-cli --version "^2.0" --locked
          cargo tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caldera-windows
          path: |
            backend/target/release/bundle/msi/*.msi
            backend/target/release/bundle/nsis/*.exe
            backend/target/release/caldera.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: caldera-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: caldera-windows
          path: artifacts/windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CALDERA ${{ github.ref_name }}
          body: |
            ## CALDERA ${{ github.ref_name }}

            Cross-platform mod manager. Linux-first, Windows supported.

            ### Downloads
            - **Linux (Fedora)** — `.rpm`
            - **Linux (Arch)** — `.AppImage` for now (AUR coming)
            - **Linux (universal)** — `.AppImage`
            - **Windows** — `.msi` or `.exe` installer

            ### Install
            **Fedora:**
            ```
            sudo dnf install caldera-*.rpm
            ```

            **AppImage:**
            ```
            chmod +x CALDERA-*.AppImage
            ./CALDERA-*.AppImage
            ```

            **Windows:** double-click the `.msi` or `.exe` installer.
          files: |
            artifacts/linux/**/*
            artifacts/windows/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
